apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: deep-quest
  labels:
    app.kubernetes.io/name: deep-quest
    app.kubernetes.io/component: ai
spec:
  type: ClusterIP
  # Session affinity 기본 적용: LangGraph inmem는 스레드/상태를 파드별로 보관 → 같은 클라이언트(Web 파드)는 같은 AI 파드로
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3시간
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app.kubernetes.io/name: deep-quest
    app.kubernetes.io/component: ai
