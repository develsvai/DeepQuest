# ServiceAccount for Deep Quest applications (Harbor imagePullSecrets 포함)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: deep-quest-sa
  namespace: deep-quest
  labels:
    app.kubernetes.io/name: deep-quest
imagePullSecrets:
  - name: harbor-pull-secret
---
# Role for Deep Quest namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deep-quest-role
  namespace: deep-quest
  labels:
    app.kubernetes.io/name: deep-quest
rules:
  # ConfigMap/Secret 읽기
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  # Pod 상태 확인
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Service 접근
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deep-quest-rolebinding
  namespace: deep-quest
  labels:
    app.kubernetes.io/name: deep-quest
subjects:
  - kind: ServiceAccount
    name: deep-quest-sa
    namespace: deep-quest
roleRef:
  kind: Role
  name: deep-quest-role
  apiGroup: rbac.authorization.k8s.io
