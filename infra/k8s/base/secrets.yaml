---
# Harbor Registry Pull Secret
# 실제 값은 배포 전 수동으로 생성하거나 Sealed Secrets 사용
# kubectl create secret docker-registry harbor-pull-secret \
#   --docker-server=harbor.192.168.0.110.nip.io \
#   --docker-username=<username> \
#   --docker-password=<password> \
#   -n deep-quest
apiVersion: v1
kind: Secret
metadata:
  name: harbor-pull-secret
  namespace: deep-quest
  labels:
    app.kubernetes.io/name: deep-quest
type: kubernetes.io/dockerconfigjson
data:
  # Base64 encoded docker config - REPLACE WITH ACTUAL VALUE
  .dockerconfigjson: REPLACE_WITH_BASE64_ENCODED_DOCKER_CONFIG
---
# PostgreSQL Credentials
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: deep-quest
  labels:
    app.kubernetes.io/name: deep-quest
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  # 실제 배포 전 값 변경 필요
  # 비밀번호에 @ 포함 시 DATABASE_URL/DIRECT_URL에서 %40으로 인코딩
  POSTGRES_DB: deepquest
  POSTGRES_USER: deepquest
  POSTGRES_PASSWORD: CHANGE_ME_STRONG_PASSWORD
  DATABASE_URL: postgresql://deepquest:CHANGE_ME_STRONG_PASSWORD@postgres-service:5432/deepquest
  DIRECT_URL: postgresql://deepquest:CHANGE_ME_STRONG_PASSWORD@postgres-service:5432/deepquest
---
# AI Server Secrets
apiVersion: v1
kind: Secret
metadata:
  name: ai-secret
  namespace: deep-quest
  labels:
    app.kubernetes.io/name: deep-quest
    app.kubernetes.io/component: ai
type: Opaque
stringData:
  # Google Gemini API Key - REQUIRED
  GOOGLE_API_KEY: REPLACE_WITH_GOOGLE_API_KEY
  # LangSmith - LangGraph API 기동 시 검증에 사용 (LangGraph Cloud 접근 권한 있는 계정의 키 필요)
  LANGSMITH_API_KEY: REPLACE_WITH_LANGSMITH_API_KEY
  LANGCHAIN_API_KEY: REPLACE_WITH_LANGSMITH_API_KEY
  # (선택) 프로덕션 라이선스 보유 시. 없으면 유효한 LANGSMITH_API_KEY 필요
  # LANGGRAPH_CLOUD_LICENSE_KEY: ""
  # LangGraph 프로덕션 Standalone (2단계). docker/ai/.env.prod 의 LANGGRAPH_DATABASE_URI 사용
  LANGGRAPH_DATABASE_URI: REPLACE_WITH_LANGGRAPH_DATABASE_URI
---
# Web Server Secrets
apiVersion: v1
kind: Secret
metadata:
  name: web-secret
  namespace: deep-quest
  labels:
    app.kubernetes.io/name: deep-quest
    app.kubernetes.io/component: web
type: Opaque
stringData:
  # Clerk Authentication - REQUIRED
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: REPLACE_WITH_CLERK_PUBLISHABLE_KEY
  CLERK_SECRET_KEY: REPLACE_WITH_CLERK_SECRET_KEY
  CLERK_WEBHOOK_SIGNING_SECRET: REPLACE_WITH_CLERK_WEBHOOK_SIGNING_SECRET
  # Supabase Storage - REQUIRED
  NEXT_PUBLIC_SUPABASE_URL: REPLACE_WITH_SUPABASE_URL
  NEXT_PUBLIC_SUPABASE_ANON_KEY: REPLACE_WITH_SUPABASE_ANON_KEY
  SUPABASE_SERVICE_ROLE_KEY: REPLACE_WITH_SUPABASE_SERVICE_ROLE_KEY
  # LangGraph Client - REQUIRED
  LANGSMITH_API_KEY: REPLACE_WITH_LANGSMITH_API_KEY
  # AI Server URL (포트 8000)
  LANGGRAPH_API_URL: http://ai-service:8000
  # AI Webhook Secret
  AI_WEBHOOK_SECRET: REPLACE_WITH_AI_WEBHOOK_SECRET
  # Sentry (Optional)
  NEXT_PUBLIC_SENTRY_DSN: ""
---
# Tailscale Auth (Dev 전용 - Funnel 사이드카)
# https://login.tailscale.com/admin/settings/keys 에서 생성
# Ephemeral + Reusable 권장 (컨테이너 재시작 시에도 사용)
apiVersion: v1
kind: Secret
metadata:
  name: tailscale-auth
  namespace: deep-quest
  labels:
    app.kubernetes.io/name: deep-quest
type: Opaque
stringData:
  TS_AUTHKEY: REPLACE_WITH_TAILSCALE_AUTH_KEY
