---
# Postgres Backup CronJob
# 매일 새벽 3시(KST)에 pg_dump 실행, 7일치 보관
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: deep-quest
  labels:
    app.kubernetes.io/name: deep-quest
    app.kubernetes.io/component: postgres-backup
spec:
  # 매일 새벽 3시 KST (UTC 18:00)
  schedule: "0 18 * * *"
  timeZone: "Asia/Seoul"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: deep-quest
            app.kubernetes.io/component: postgres-backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              imagePullPolicy: IfNotPresent
              env:
                - name: PGHOST
                  value: postgres-service
                - name: PGPORT
                  value: "5432"
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_DB
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_PASSWORD
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  BACKUP_DIR=/backups
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="${BACKUP_DIR}/deepquest_${TIMESTAMP}.sql.gz"
                  
                  echo "=== Postgres Backup Started ==="
                  echo "Timestamp: ${TIMESTAMP}"
                  echo "Database: ${PGDATABASE}"
                  echo "Target: ${BACKUP_FILE}"
                  
                  # pg_dump 실행 및 압축
                  pg_dump --verbose --clean --if-exists --no-owner --no-acl | gzip > "${BACKUP_FILE}"
                  
                  # 백업 파일 크기 확인
                  FILESIZE=$(ls -lh "${BACKUP_FILE}" | awk '{print $5}')
                  echo "Backup completed: ${BACKUP_FILE} (${FILESIZE})"
                  
                  # 7일 이상 된 백업 삭제
                  echo "=== Cleaning old backups (older than 7 days) ==="
                  find ${BACKUP_DIR} -name "deepquest_*.sql.gz" -mtime +7 -delete -print || true
                  
                  # 현재 백업 목록 출력
                  echo "=== Current backups ==="
                  ls -lht ${BACKUP_DIR}/deepquest_*.sql.gz 2>/dev/null || echo "No backups found"
                  
                  echo "=== Backup Completed Successfully ==="
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postgres-backup
