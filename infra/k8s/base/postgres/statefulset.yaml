apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: deep-quest
  labels:
    app.kubernetes.io/name: deep-quest
    app.kubernetes.io/component: postgres
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deep-quest
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deep-quest
        app.kubernetes.io/component: postgres
    spec:
      serviceAccountName: deep-quest-sa
      terminationGracePeriodSeconds: 30
      
      securityContext:
        fsGroup: 999
      
      initContainers:
        # Init container to set proper permissions
        - name: init-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              chown -R 999:999 /var/lib/postgresql/data
              chmod 700 /var/lib/postgresql/data
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          securityContext:
            runAsUser: 0
      
      containers:
        - name: postgres
          image: harbor.192.168.0.110.nip.io/deep-quest/postgres:latest
          imagePullPolicy: Always
          
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          
          envFrom:
            - secretRef:
                name: postgres-secret
          
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            # postgresql.conf 마운트 제거 - 기본 설정 사용
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
            # 백업 볼륨 마운트
            - name: backup-storage
              mountPath: /backups
          
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          
          # securityContext 제거 - postgres 이미지 기본 동작 사용
      
      volumes:
        - name: postgres-init
          configMap:
            name: postgres-init-scripts
            defaultMode: 0755
        - name: backup-storage
          persistentVolumeClaim:
            claimName: postgres-backup
      
      imagePullSecrets:
        - name: harbor-pull-secret

  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app.kubernetes.io/name: deep-quest
          app.kubernetes.io/component: postgres
      spec:
        accessModes:
          - ReadWriteOnce
        # NFS: 노드 장애 시에도 데이터 유지 (local-path는 노드 로컬에만 저장)
        storageClassName: nfs-storage
        resources:
          requests:
            storage: 10Gi
