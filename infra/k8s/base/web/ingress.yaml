apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-ingress
  namespace: deep-quest
  labels:
    app.kubernetes.io/name: deep-quest
    app.kubernetes.io/component: web
  annotations:
    kubernetes.io/ingress.class: nginx
    # HTTPS 리다이렉트
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # 프록시 설정
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # WebSocket 지원 (Next.js HMR, LangGraph streaming)
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # Session affinity 기본 적용: 동일 클라이언트 → 동일 Web 파드 (LangGraph 스레드가 같은 AI 파드로 가도록 Web→AI affinity와 연동)
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "INGRESSCOOKIE"
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
    nginx.ingress.kubernetes.io/session-cookie-path: "/"
    # CORS 설정 (필요시)
    # nginx.ingress.kubernetes.io/enable-cors: "true"
    # Rate limiting (선택사항)
    # nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - deepquest.192.168.0.110.nip.io
      secretName: deepquest-tls-secret
  rules:
    - host: deepquest.192.168.0.110.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-service
                port:
                  number: 80
