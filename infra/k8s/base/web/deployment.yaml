apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server
  namespace: deep-quest
  labels:
    app.kubernetes.io/name: deep-quest
    app.kubernetes.io/component: web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: deep-quest
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deep-quest
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: deep-quest-sa
      terminationGracePeriodSeconds: 30
      
      initContainers:
        # PostgreSQL 연결 대기
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgres-service 5432; do
                echo "PostgreSQL is unavailable - sleeping"
                sleep 2
              done
              echo "PostgreSQL is ready!"
        
        # AI Server 연결 대기
        - name: wait-for-ai
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for AI Server..."
              until nc -z ai-service 8000; do
                echo "AI Server is unavailable - sleeping"
                sleep 2
              done
              echo "AI Server is ready!"
      
      containers:
        - name: web
          image: harbor.192.168.0.110.nip.io/deep-quest/web:dev
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          
          envFrom:
            - configMapRef:
                name: web-config
            - secretRef:
                name: web-secret
          
          env:
            # Database URL from secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
            - name: DIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DIRECT_URL
            # App URL (will be overridden by Ingress)
            - name: NEXT_PUBLIC_APP_URL
              value: "https://deepquest.192.168.0.110.nip.io"
          
          # 확장성 대안: 파드당 리소스 축소 → HPA로 더 많은 파드 스케일아웃 (Task1 §4.5)
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      
      imagePullSecrets:
        - name: harbor-pull-secret
      
      # Pod Anti-Affinity: 다른 노드에 분산 배치
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: deep-quest
                    app.kubernetes.io/component: web
                topologyKey: kubernetes.io/hostname
