apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: deep-quest

resources:
  # - namespace.yaml  # Argo CD 프로젝트에서 Namespace 생성 불허 → 클러스터에 직접 생성
  - rbac.yaml
  - tailscale
  # - secrets.yaml  # 시크릿은 클러스터에 직접 적용
  - configmap.yaml
  - postgres
  - redis
  - ai
  - web
  - langgraph-run-metrics

labels:
  - pairs:
      app.kubernetes.io/name: deep-quest
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: true

commonAnnotations:
  app.kubernetes.io/version: "1.0.0"
