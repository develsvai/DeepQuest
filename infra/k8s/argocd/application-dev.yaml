apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: deep-quest-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/develsvai/deep-quest-infra.git
    targetRevision: deploy  # Jenkins가 이미지 태그 푸시하는 브랜치
    path: k8s/overlays/dev
  
  destination:
    server: https://kubernetes.default.svc
    namespace: deep-quest
  
  syncPolicy:
    automated:
      prune: true       # 삭제된 리소스 자동 정리
      selfHeal: true    # 수동 변경 자동 복구
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  # Health Check 설정
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas  # HPA 사용 시 replica 차이 무시
