# Tailscale Funnel - standalone Pod (web-service로 트래픽 프록시)
# Prod: Clerk webhook 등 HTTPS 공개 URL 제공
# Funnel은 localhost만 지원하므로 forwarder가 web-service:80 → localhost:3000 전달
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale-funnel
  namespace: deep-quest
  labels:
    app.kubernetes.io/name: deep-quest
    app.kubernetes.io/component: tailscale-funnel
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deep-quest
      app.kubernetes.io/component: tailscale-funnel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deep-quest
        app.kubernetes.io/component: tailscale-funnel
    spec:
      serviceAccountName: deep-quest-sa
      terminationGracePeriodSeconds: 30
      volumes:
        - name: forwarder-ready
          emptyDir: {}
      initContainers:
        - name: wait-for-web
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for web-service..."
              until nc -z web-service 80; do sleep 2; done
              echo "web-service is ready."
      containers:
        # web-service → localhost:3000 프록시 (Funnel은 localhost만 지원)
        - name: forwarder
          image: alpine:3.19
          volumeMounts:
            - name: forwarder-ready
              mountPath: /tmp/ready
          command:
            - sh
            - -c
            - |
              apk add --no-cache socat
              echo "Forwarding localhost:3000 -> web-service:80"
              socat TCP-LISTEN:3000,fork,reuseaddr TCP:web-service:80 &
              sleep 2
              echo ready > /tmp/ready/forwarder
              wait
          ports:
            - name: funnel
              containerPort: 3000
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

        # Tailscale Funnel: localhost:3000을 공개 URL로 노출 (Clerk webhook용)
        - name: tailscale
          image: ghcr.io/tailscale/tailscale:latest
          volumeMounts:
            - name: forwarder-ready
              mountPath: /tmp/ready
          env:
            - name: TS_KUBE_SECRET
              value: "tailscale-funnel-prod-state"
            - name: TS_USERSPACE
              value: "true"
            - name: TS_HOSTNAME
              value: "deepquest"
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: TS_AUTHKEY
          command:
            - /bin/sh
            - -c
            - |
              # 1. forwarder가 리스닝할 때까지 대기
              echo "Waiting for forwarder..."
              until [ -f /tmp/ready/forwarder ]; do sleep 1; done
              sleep 2
              echo "Forwarder ready."

              # 2. tailscaled 백그라운드 실행
              tailscaled \
                --state=kube:${TS_KUBE_SECRET} \
                --socket=/tmp/tailscaled.sock \
                --tun=userspace-networking &

              # 3. 소켓 생성 대기
              echo "Waiting for tailscaled socket..."
              until [ -S /tmp/tailscaled.sock ]; do sleep 1; done
              echo "Tailscaled socket found."

              # 4. Tailscale 로그인 (Up)
              tailscale --socket=/tmp/tailscaled.sock up \
                --authkey="${TS_AUTHKEY}" \
                --hostname="${TS_HOSTNAME}" \
                --accept-dns=true

              # 5. Funnel: localhost:3000을 HTTPS로 공개
              tailscale --socket=/tmp/tailscaled.sock funnel 3000

              wait
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
