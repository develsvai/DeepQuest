apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prometheus가 스크랩할 ServiceMonitor 선택에 사용. Prometheus CR의 serviceMonitorSelector.matchLabels.release 와 동일해야 함.
# kube-prometheus-stack 설치 시 보통 kube-prometheus-stack. 다르면 이 값만 수정 후 적용.
commonLabels:
  release: kube-prometheus-stack

resources:
  - service.yaml
  - servicemonitor.yaml
